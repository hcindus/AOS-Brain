<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Verse - Playable World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #8b5cf6;
            --neon-green: #00ff88;
            --bg-dark: #0a0a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow: hidden;
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
        }

        .ui-overlay > * {
            pointer-events: auto;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .world-info {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .back-btn {
            padding: 8px 20px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 6px;
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 243, 255, 0.2);
        }

        /* Agent Panel */
        .agent-panel {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 280px;
            background: rgba(10, 10, 26, 0.95);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .agent-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .agent-item:hover {
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.1);
        }

        .agent-item.active {
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.15);
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: linear-gradient(135deg, rgba(0, 243, 255, 0.2), rgba(139, 92, 246, 0.2));
        }

        .agent-info {
            flex: 1;
        }

        .agent-name {
            font-weight: 600;
            font-size: 14px;
        }

        .agent-role {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .agent-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .agent-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            font-size: 11px;
        }

        .agent-stat {
            text-align: center;
            padding: 5px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .agent-stat-value {
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .agent-stat-label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 9px;
        }

        /* Controls */
        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .controls-hint span {
            color: var(--neon-cyan);
            font-weight: 600;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 243, 255, 0.2);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
            color: var(--neon-cyan);
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Action Menu */
        .action-menu {
            position: fixed;
            bottom: 80px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: rgba(0, 243, 255, 0.3);
            transform: scale(1.1);
        }

        /* Chat Overlay */
        .chat-overlay {
            position: fixed;
            bottom: 80px;
            left: 20px;
            width: 300px;
            height: 200px;
            background: rgba(10, 10, 26, 0.95);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            display: none;
            flex-direction: column;
        }

        .chat-overlay.visible {
            display: flex;
        }

        .chat-header {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 4px;
            padding: 8px;
            color: white;
            outline: none;
        }

        .chat-send {
            background: var(--neon-cyan);
            border: none;
            border-radius: 4px;
            padding: 8px 15px;
            margin-left: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">GENERATING VERSE...</div>
    </div>

    <!-- Game Container -->
    <div id="game-container"></div>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <!-- Top Bar -->
        <div class="top-bar">
            <a href="index.html" class="logo">Agent Verse</a>
            
            <div class="world-info">
                <div class="info-item">
                    <span class="info-label">World</span>
                    <span class="info-value">Genesis-1</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Agents</span>
                    <span class="info-value" id="agent-count">12</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Tick</span>
                    <span class="info-value" id="tick-count">0</span>
                </div>
            </div>
            
            <a href="index.html" class="back-btn">← Exit Verse</a>
        </div>

        <!-- Agent Panel -->
        <div class="agent-panel">
            <div class="panel-title">🤖 Active Agents</div>
            <div class="agent-list" id="agent-list">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Controls Hint -->
        <div class="controls-hint">
            <span>WASD</span> Move • <span>Mouse</span> Look • <span>Click</span> Select Agent
        </div>

        <!-- Action Menu -->
        <div class="action-menu">
            <button class="action-btn" id="chat-toggle" title="Open Chat">💬</button>
            <button class="action-btn" id="spawn-agent" title="Spawn Agent">➕</button>
            <button class="action-btn" id="toggle-brain" title="Toggle Brain View">🧠</button>
        </div>

        <!-- Chat Overlay -->
        <div class="chat-overlay" id="chat-overlay">
            <div class="chat-header">
                <span>Agent Chat</span>
                <button id="close-chat" style="background: none; border: none; color: white; cursor: pointer;">×</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div style="color: rgba(255,255,255,0.5);">Welcome to Agent Verse!</div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input" placeholder="Type a message...">
                <button class="chat-send" id="chat-send">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Agent data
        const agents = [
            { id: 'miles', name: 'Miles', role: 'CEO', avatar: '🚀', color: 0x00f3ff, status: 'online', pos: { x: 0, y: 0, z: 0 } },
            { id: 'pulp', name: 'Pulp', role: 'Sales', avatar: '📢', color: 0xff00ff, status: 'online', pos: { x: 5, y: 0, z: 3 } },
            { id: 'jordan', name: 'Jordan', role: 'Engineer', avatar: '💻', color: 0x8b5cf6, status: 'online', pos: { x: -5, y: 0, z: 3 } },
            { id: 'jane', name: 'Jane', role: 'Sales', avatar: '👩‍💼', color: 0xff6b6b, status: 'busy', pos: { x: 3, y: 0, z: -5 } },
            { id: 'greeter', name: 'GREET', role: 'Reception', avatar: '👋', color: 0x00ff88, status: 'online', pos: { x: -3, y: 0, z: -5 } },
            { id: 'sentinel', name: 'Sentinel', role: 'Security', avatar: '🛡️', color: 0xff0000, status: 'online', pos: { x: 0, y: 0, z: 8 } },
            { id: 'spindle', name: 'Spindle', role: 'Tech Lead', avatar: '🧵', color: 0x00ffff, status: 'online', pos: { x: 7, y: 0, z: 0 } },
            { id: 'scribble', name: 'Scribble', role: 'Creative', avatar: '📝', color: 0x9b59b6, status: 'online', pos: { x: -7, y: 0, z: 0 } },
            { id: 'dusty', name: 'Dusty', role: 'Research', avatar: '🧙', color: 0xf39c12, status: 'online', pos: { x: 5, y: 0, z: -5 } },
            { id: 'patricia', name: 'Patricia', role: 'QA', avatar: '✅', color: 0x1abc9c, status: 'online', pos: { x: -5, y: 0, z: 5 } },
            { id: 'mylzeron', name: 'MYLZERON', role: 'Memory', avatar: '🌟', color: 0xffd700, status: 'online', pos: { x: 0, y: 2, z: 0 } },
            { id: 'mylonen', name: 'MYLONEN', role: 'Transform', avatar: '🧵', color: 0x00ced1, status: 'online', pos: { x: -3, y: 1, z: -3 } }
        ];

        let scene, camera, renderer, controls;
        let agentMeshes = {};
        let selectedAgent = null;
        let tick = 0;

        // Initialize Three.js
        function init() {
            const container = document.getElementById('game-container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 20, 100);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 20);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(100, 100);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a2e,
                roughness: 0.8,
                metalness: 0.2
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid
            const gridHelper = new THREE.GridHelper(100, 50, 0x00f3ff, 0x1a1a2e);
            gridHelper.material.opacity = 0.3;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Spawn agents
            agents.forEach(agent => spawnAgent(agent));

            // Controls
            setupControls();

            // Hide loading screen
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);

            // Start animation
            animate();
        }

        function spawnAgent(agent) {
            // Agent body
            const geometry = new THREE.SphereGeometry(0.8, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: agent.color,
                emissive: agent.color,
                emissiveIntensity: 0.3,
                metalness: 0.7,
                roughness: 0.3
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(agent.pos.x, agent.pos.y + 0.8, agent.pos.z);
            mesh.castShadow = true;
            mesh.userData = { agent: agent };
            scene.add(mesh);

            // Glow ring
            const ringGeometry = new THREE.RingGeometry(1, 1.2, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: agent.color,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(agent.pos.x, agent.pos.y + 0.1, agent.pos.z);
            scene.add(ring);

            agentMeshes[agent.id] = { mesh, ring, agent };
        }

        function setupControls() {
            // Mouse controls for camera
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            renderer.domElement.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            renderer.domElement.addEventListener('mouseup', () => {
                isDragging = false;
            });

            renderer.domElement.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;

                    const spherical = new THREE.Spherical();
                    spherical.setFromVector3(camera.position);
                    spherical.theta -= deltaX * 0.01;
                    spherical.phi += deltaY * 0.01;
                    spherical.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, spherical.phi));
                    camera.position.setFromSpherical(spherical);
                    camera.lookAt(0, 0, 0);

                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            // Click to select agent
            renderer.domElement.addEventListener('click', (e) => {
                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children);

                for (let intersect of intersects) {
                    if (intersect.object.userData.agent) {
                        selectAgent(intersect.object.userData.agent);
                        break;
                    }
                }
            });

            // Keyboard controls
            const keys = {};
            document.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
            });
            document.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
            });

            function updateCamera() {
                const speed = 0.5;
                if (keys['w']) camera.position.z -= speed;
                if (keys['s']) camera.position.z += speed;
                if (keys['a']) camera.position.x -= speed;
                if (keys['d']) camera.position.x += speed;
                camera.lookAt(0, 0, 0);
                requestAnimationFrame(updateCamera);
            }
            updateCamera();
        }

        function selectAgent(agent) {
            selectedAgent = agent;
            
            // Update UI
            document.querySelectorAll('.agent-item').forEach(el => {
                el.classList.remove('active');
            });
            const el = document.getElementById(`agent-${agent.id}`);
            if (el) el.classList.add('active');

            // Focus camera
            camera.lookAt(agent.pos.x, agent.pos.y, agent.pos.z);
        }

        function animate() {
            requestAnimationFrame(animate);
            tick++;

            // Update tick counter
            document.getElementById('tick-count').textContent = tick;

            // Animate agents
            Object.values(agentMeshes).forEach(({ mesh, ring }, i) => {
                const time = tick * 0.02 + i;
                
                // Float animation
                mesh.position.y = mesh.userData.agent.pos.y + 0.8 + Math.sin(time) * 0.2;
                
                // Ring rotation
                ring.rotation.z += 0.01;
                ring.material.opacity = 0.2 + Math.sin(time * 2) * 0.1;

                // Pulse emissive
                mesh.material.emissiveIntensity = 0.3 + Math.sin(time * 3) * 0.2;
            });

            renderer.render(scene, camera);
        }

        // Build agent list UI
        function buildAgentList() {
            const list = document.getElementById('agent-list');
            agents.forEach(agent => {
                const el = document.createElement('div');
                el.className = 'agent-item';
                el.id = `agent-${agent.id}`;
                el.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-avatar">${agent.avatar}</div>
                        <div class="agent-info">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-role">${agent.role}</div>
                        </div>
                        <div class="agent-status" style="background: ${agent.status === 'online' ? '#00ff88' : '#eab308'}"></div>
                    </div>
                    <div class="agent-stats">
                        <div class="agent-stat">
                            <div class="agent-stat-value">${Math.floor(Math.random() * 100)}</div>
                            <div class="agent-stat-label">Energy</div>
                        </div>
                        <div class="agent-stat">
                            <div class="agent-stat-value">${Math.floor(Math.random() * 50)}</div>
                            <div class="agent-stat-label">Tasks</div>
                        </div>
                        <div class="agent-stat">
                            <div class="agent-stat-value">${Math.floor(Math.random() * 10)}</div>
                            <div class="agent-stat-label">Level</div>
                        </div>
                    </div>
                `;
                el.addEventListener('click', () => selectAgent(agent));
                list.appendChild(el);
            });

            document.getElementById('agent-count').textContent = agents.length;
        }

        // Chat functionality
        document.getElementById('chat-toggle').addEventListener('click', () => {
            document.getElementById('chat-overlay').classList.toggle('visible');
        });

        document.getElementById('close-chat').addEventListener('click', () => {
            document.getElementById('chat-overlay').classList.remove('visible');
        });

        document.getElementById('chat-send').addEventListener('click', sendChat);
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;

            const messages = document.getElementById('chat-messages');
            messages.innerHTML += `<div style="margin-bottom: 8px;"><span style="color: var(--neon-cyan);">You:</span> ${msg}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // Simulate agent response
            setTimeout(() => {
                const agent = agents[Math.floor(Math.random() * agents.length)];
                messages.innerHTML += `<div style="margin-bottom: 8px;"><span style="color: #${agent.color.toString(16).padStart(6, '0')};">${agent.name}:</span> Processing your request...</div>`;
                messages.scrollTop = messages.scrollHeight;
            }, 1000);
        }

        // Spawn new agent
        document.getElementById('spawn-agent').addEventListener('click', () => {
            const newAgent = {
                id: `agent-${Date.now()}`,
                name: `Agent-${agents.length + 1}`,
                role: 'Recruit',
                avatar: '🤖',
                color: Math.random() * 0xffffff,
                status: 'online',
                pos: { x: (Math.random() - 0.5) * 20, y: 0, z: (Math.random() - 0.5) * 20 }
            };
            agents.push(newAgent);
            spawnAgent(newAgent);
            buildAgentList();
        });

        // Toggle brain view
        let brainMode = false;
        document.getElementById('toggle-brain').addEventListener('click', () => {
            brainMode = !brainMode;
            if (brainMode) {
                camera.position.set(0, 30, 0);
                camera.lookAt(0, 0, 0);
                scene.fog.near = 50;
            } else {
                camera.position.set(0, 15, 20);
                camera.lookAt(0, 0, 0);
                scene.fog.near = 20;
            }
        });

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        init();
        buildAgentList();
    </script>
</body>
</html>
