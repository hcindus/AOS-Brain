<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI 3D Logo Preview</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a1a; }
        #canvas-container { width: 100vw; height: 100vh; }
        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e5e5e5;
            font-family: 'Segoe UI', sans-serif;
            z-index: 10;
        }
        .overlay h1 { margin: 0; color: #ed8936; }
        .overlay p { margin: 5px 0 0; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>AGI Neural Network</h1>
        <p>Drag to rotate • Scroll to zoom</p>
    </div>
    <div id="canvas-container"></div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0xed8936, 1, 100);
        pointLight1.position.set(10, 10, 10);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x1a365d, 1, 100);
        pointLight2.position.set(-10, -10, 10);
        scene.add(pointLight2);

        // Create neural network visualization
        const nodes = [];
        const connections = [];
        const nodeCount = 50;
        const radius = 8;

        // Node material
        const nodeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
        const nodeMaterial = new THREE.MeshStandardMaterial({
            color: 0xed8936,
            emissive: 0xed8936,
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.2
        });

        // Create nodes in spherical distribution
        for (let i = 0; i < nodeCount; i++) {
            const phi = Math.acos(-1 + (2 * i) / nodeCount);
            const theta = Math.sqrt(nodeCount * Math.PI) * phi;

            const x = radius * Math.cos(theta) * Math.sin(phi);
            const y = radius * Math.sin(theta) * Math.sin(phi);
            const z = radius * Math.cos(phi);

            const node = new THREE.Mesh(nodeGeometry, nodeMaterial.clone());
            node.position.set(x, y, z);
            
            // Store original position for animation
            node.userData.originalPos = node.position.clone();
            node.userData.phase = Math.random() * Math.PI * 2;
            node.userData.speed = 0.5 + Math.random() * 0.5;
            
            scene.add(node);
            nodes.push(node);
        }

        // Create connections
        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0xed8936,
            transparent: true,
            opacity: 0.15
        });

        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                const dist = nodes[i].position.distanceTo(nodes[j].position);
                if (dist < 4) {
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        nodes[i].position,
                        nodes[j].position
                    ]);
                    const line = new THREE.Line(geometry, lineMaterial);
                    line.userData.nodeIndices = [i, j];
                    scene.add(line);
                    connections.push(line);
                }
            }
        }

        // Add AGI text in center
        const loader = new THREE.FontLoader();
        
        // Create center glow
        const glowGeometry = new THREE.SphereGeometry(2, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0xed8936,
            transparent: true,
            opacity: 0.1
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        scene.add(glow);

        // Mouse interaction
        let mouseX = 0;
        let mouseY = 0;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationSpeed = { x: 0, y: 0 };

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;

            if (isDragging) {
                rotationSpeed.x = (e.clientX - previousMousePosition.x) * 0.005;
                rotationSpeed.y = (e.clientY - previousMousePosition.y) * 0.005;
            }
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);

        // Scroll to zoom
        document.addEventListener('wheel', (e) => {
            camera.position.z += e.deltaY * 0.01;
            camera.position.z = Math.max(10, Math.min(50, camera.position.z));
        });

        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Rotate entire network
            scene.rotation.y += rotationSpeed.x;
            scene.rotation.x += rotationSpeed.y;
            
            // Damping
            rotationSpeed.x *= 0.95;
            rotationSpeed.y *= 0.95;

            // Auto-rotate when not interacting
            if (!isDragging) {
                scene.rotation.y += 0.001;
            }

            // Animate nodes
            nodes.forEach((node, i) => {
                const pulse = Math.sin(time * node.userData.speed + node.userData.phase) * 0.3;
                node.scale.setScalar(1 + pulse * 0.5);
                
                // Gentle float
                node.position.x = node.userData.originalPos.x + Math.sin(time + i) * 0.2;
                node.position.y = node.userData.originalPos.y + Math.cos(time + i) * 0.2;
                node.position.z = node.userData.originalPos.z + Math.sin(time * 0.5 + i) * 0.2;
            });

            // Update connection lines
            connections.forEach(line => {
                const [i, j] = line.userData.nodeIndices;
                const positions = line.geometry.attributes.position.array;
                positions[0] = nodes[i].position.x;
                positions[1] = nodes[i].position.y;
                positions[2] = nodes[i].position.z;
                positions[3] = nodes[j].position.x;
                positions[4] = nodes[j].position.y;
                positions[5] = nodes[j].position.z;
                line.geometry.attributes.position.needsUpdate = true;
            });

            // Pulse glow
            glow.scale.setScalar(1 + Math.sin(time) * 0.1);

            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
