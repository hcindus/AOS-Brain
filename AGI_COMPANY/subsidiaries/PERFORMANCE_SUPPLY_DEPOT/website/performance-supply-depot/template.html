<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Company - {{PAGE_TITLE}}</title>
    <style>
        :root {
            --bg-dark: #0a0a1a;
            --bg-card: rgba(255, 255, 255, 0.05);
            --header-bg: rgba(26, 54, 93, 0.95);
            --text: #e5e5e5;
            --text-muted: #a0a0a0;
            --accent: #ed8936;
            --accent-hover: #dd6b20;
            --border: rgba(237, 137, 54, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            text-decoration: none;
        }

        .logo span { color: var(--accent); }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .header-nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: color 0.3s;
        }

        .header-nav a:hover,
        .header-nav a.active {
            color: var(--accent);
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 20px;
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 700;
        }

        /* Layout */
        .layout {
            display: flex;
            min-height: 100vh;
            padding-top: 70px;
            padding-bottom: 60px;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(26, 54, 93, 0.9);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            position: fixed;
            left: 0;
            top: 70px;
            bottom: 60px;
            overflow-y: auto;
        }

        .sidebar-section {
            margin-bottom: 35px;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 8px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(237, 137, 54, 0.15);
            color: var(--accent);
        }

        .sidebar-menu .icon {
            margin-right: 12px;
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
            min-height: calc(100vh - 130px);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 1000;
        }

        .footer-left {
            color: var(--text-muted);
            font-size: 14px;
        }

        .footer-right {
            display: flex;
            gap: 25px;
        }

        .footer-right a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .footer-right a:hover {
            color: var(--accent);
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .card h2 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 24px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Text visibility - 100% */
        h1, h2, h3, h4, h5, h6 {
            color: var(--text);
            margin-bottom: 15px;
        }

        p {
            color: var(--text);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .text-muted {
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="index.html" class="logo">AGI<span>Company</span></a>
        <nav class="header-nav">
            <a href="index.html" class="active">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">
                Cart <span class="cart-icon">🛒<span class="cart-badge" id="cart-count">0</span></span>
            </a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <!-- Layout -->
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Main Menu</div>
                <ul class="sidebar-menu">
                    <li><a href="index.html" class="active"><span class="icon">🏠</span> Home</a></li>
                    <li><a href="products.html"><span class="icon">🛍️</span> Products</a></li>
                    <li><a href="cart.html"><span class="icon">🛒</span> Cart</a></li>
                    <li><a href="orders.html"><span class="icon">📦</span> Orders</a></li>
                </ul>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Account</div>
                <ul class="sidebar-menu">
                    <li><a href="dashboard.html"><span class="icon">📊</span> Dashboard</a></li>
                    <li><a href="profile.html"><span class="icon">👤</span> Profile</a></li>
                    <li><a href="settings.html"><span class="icon">⚙️</span> Settings</a></li>
                </ul>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Support</div>
                <ul class="sidebar-menu">
                    <li><a href="help.html"><span class="icon">❓</span> Help</a></li>
                    <li><a href="contact.html"><span class="icon">✉️</span> Contact</a></li>
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- PAGE CONTENT GOES HERE -->
            
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-left">
            © 2026 AGI Company. All rights reserved.
        </div>
        <div class="footer-right">
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="support.html">Support</a>
        </div>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
