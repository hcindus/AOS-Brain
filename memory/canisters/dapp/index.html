<!--
  Canister #4: Simple dApp Frontend
  Purpose: Demonstrate frontend integration with ICP canisters
  This can be served directly from an ICP canister (asset canister)
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Factory Counter dApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        
        .counter-display {
            font-size: 6rem;
            font-weight: bold;
            margin: 30px 0;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(45deg, #7b2cbf, #00d4ff);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .reset-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .status.loading {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }
        
        .status.error {
            background: rgba(255, 65, 108, 0.2);
            color: #ff416c;
        }
        
        .status.success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        
        .auth-section {
            margin-bottom: 30px;
        }
        
        .principal-display {
            font-size: 0.8rem;
            color: #666;
            word-break: break-all;
            margin-top: 10px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Dark Factory</h1>
        <p class="subtitle">Internet Computer Counter dApp</p>
        
        <div class="auth-section">
            <button id="loginBtn" onclick="login()">Login with Internet Identity</button>
            <button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
            <div id="principal" class="principal-display"></div>
        </div>
        
        <div class="counter-display" id="counter">-</div>
        
        <div class="buttons">
            <button onclick="increment()">+ Increment</button>
            <button onclick="decrement()">- Decrement</button>
            <button class="reset-btn" onclick="reset()">Reset</button>
        </div>
        
        <div id="status" class="status" style="display:none;"></div>
        
        <footer>
            Powered by ICP | Built by The Great Cryptonio
        </footer>
    </div>

    <script type="module">
        // Import agent-js
        import { Actor, HttpAgent } from '@dfinity/agent';
        import { AuthClient } from '@dfinity/auth-client';
        
        // Canister ID would be set after deployment
        const CANISTER_ID = process.env.CANISTER_ID_COUNTER || 'rrkah-fqaaa-aaaaa-aaaaq-cai';
        
        // IDL for the Counter canister
        const idlFactory = ({ IDL }) => {
            return IDL.Service({
                'getCount': IDL.Func([], [IDL.Nat], ['query']),
                'increment': IDL.Func([], [], []),
                'decrement': IDL.Func([], [], []),
                'reset': IDL.Func([], [], []),
            });
        };
        
        let actor = null;
        let authClient = null;
        
        // Initialize
        async function init() {
            authClient = await AuthClient.create();
            
            if (await authClient.isAuthenticated()) {
                await initActor();
                showPrincipal();
            }
            
            await fetchCount();
        }
        
        async function initActor() {
            const identity = authClient.getIdentity();
            const agent = new HttpAgent({ identity });
            
            // For local development only
            if (process.env.NODE_ENV === 'development') {
                agent.fetchRootKey();
            }
            
            actor = Actor.createActor(idlFactory, {
                agent,
                canisterId: CANISTER_ID,
            });
        }
        
        // Authentication
        window.login = async function() {
            showStatus('Connecting to Internet Identity...', 'loading');
            
            await authClient.login({
                identityProvider: 'https://identity.ic0.app',
                onSuccess: async () => {
                    await initActor();
                    showPrincipal();
                    hideStatus();
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('logoutBtn').style.display = 'inline-block';
                },
            });
        };
        
        window.logout = async function() {
            await authClient.logout();
            actor = null;
            document.getElementById('principal').textContent = '';
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
        };
        
        function showPrincipal() {
            const identity = authClient.getIdentity();
            document.getElementById('principal').textContent = 
                'Principal: ' + identity.getPrincipal().toString();
        }
        
        // Canister interactions
        window.fetchCount = async function() {
            try {
                const agent = new HttpAgent();
                const anonActor = Actor.createActor(idlFactory, {
                    agent,
                    canisterId: CANISTER_ID,
                });
                
                const count = await anonActor.getCount();
                document.getElementById('counter').textContent = count.toString();
            } catch (err) {
                showStatus('Error fetching count: ' + err.message, 'error');
            }
        };
        
        window.increment = async function() {
            if (!actor) {
                showStatus('Please login first', 'error');
                return;
            }
            
            showStatus('Processing...', 'loading');
            try {
                await actor.increment();
                await fetchCount();
                showStatus('Incremented!', 'success');
                setTimeout(hideStatus, 2000);
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            }
        };
        
        window.decrement = async function() {
            if (!actor) {
                showStatus('Please login first', 'error');
                return;
            }
            
            showStatus('Processing...', 'loading');
            try {
                await actor.decrement();
                await fetchCount();
                showStatus('Decremented!', 'success');
                setTimeout(hideStatus, 2000);
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            }
        };
        
        window.reset = async function() {
            if (!actor) {
                showStatus('Please login first', 'error');
                return;
            }
            
            if (!confirm('Are you sure you want to reset the counter?')) {
                return;
            }
            
            showStatus('Processing...', 'loading');
            try {
                await actor.reset();
                await fetchCount();
                showStatus('Counter reset!', 'success');
                setTimeout(hideStatus, 2000);
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            }
        };
        
        // UI Helpers
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
        }
        
        function hideStatus() {
            document.getElementById('status').style.display = 'none';
        }
        
        // Start
        init();
    </script>
</body>
</html>
