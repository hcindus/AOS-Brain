<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite 3D - Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2d 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }
        .hud h1 {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .hud .stats {
            opacity: 0.7;
            line-height: 1.6;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .btn {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.4);
            color: #00d4ff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .btn:hover {
            background: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        .btn.active {
            background: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="hud">
        <h1>🛰️ SATELLITE 3D</h1>
        <div class="stats">
            <div>System: Online</div>
            <div>Orbit: Geostationary</div>
            <div>Panels: Deployed</div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn active" id="btn-rotate">Auto-Rotate</button>
        <button class="btn" id="btn-panels">Toggle Panels</button>
        <button class="btn" id="btn-wireframe">Wireframe</button>
    </div>
    
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 5, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 3;
        controls.maxDistance = 20;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404080, 0.3);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(10, 10, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);
        
        const blueLight = new THREE.PointLight(0x0088ff, 0.8, 20);
        blueLight.position.set(-5, 0, -5);
        scene.add(blueLight);
        
        // Materials
        const bodyMaterial = new THREE.MeshStandardMaterial({
            color: 0xcccccc,
            metalness: 0.8,
            roughness: 0.2
        });
        
        const goldMaterial = new THREE.MeshStandardMaterial({
            color: 0xffd700,
            metalness: 1.0,
            roughness: 0.1
        });
        
        const panelMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a4a,
            metalness: 0.9,
            roughness: 0.1,
            emissive: 0x000044,
            emissiveIntensity: 0.3
        });
        
        const dishMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            metalness: 0.5,
            roughness: 0.3
        });
        
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ff88,
            transparent: true,
            opacity: 0.8
        });
        
        // Satellite group
        const satellite = new THREE.Group();
        scene.add(satellite);
        
        // Main body (hexagonal prism)
        const bodyGeometry = new THREE.CylinderGeometry(0.8, 0.8, 2.5, 6);
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.castShadow = true;
        body.receiveShadow = true;
        satellite.add(body);
        
        // Gold rings on body
        const ringGeometry = new THREE.TorusGeometry(0.82, 0.05, 8, 6);
        const ring1 = new THREE.Mesh(ringGeometry, goldMaterial);
        ring1.rotation.x = Math.PI / 2;
        ring1.position.y = 0.8;
        satellite.add(ring1);
        
        const ring2 = new THREE.Mesh(ringGeometry, goldMaterial);
        ring2.rotation.x = Math.PI / 2;
        ring2.position.y = -0.8;
        satellite.add(ring2);
        
        // Bottom sphere (propulsion)
        const sphereGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const sphere = new THREE.Mesh(sphereGeometry, bodyMaterial);
        sphere.position.y = -1.8;
        sphere.castShadow = true;
        satellite.add(sphere);
        
        // Thruster glow
        const glowGeometry = new THREE.SphereGeometry(0.2, 16, 16);
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        glow.position.y = -2.3;
        satellite.add(glow);
        
        // Solar panels
        const panelGroup = new THREE.Group();
        satellite.add(panelGroup);
        
        function createSolarPanel(x, rotationY) {
            const panel = new THREE.Group();
            
            // Panel surface
            const surfaceGeometry = new THREE.BoxGeometry(3.5, 0.05, 1.2);
            const surface = new THREE.Mesh(surfaceGeometry, panelMaterial);
            surface.castShadow = true;
            surface.receiveShadow = true;
            panel.add(surface);
            
            // Panel grid lines
            for (let i = -1.5; i <= 1.5; i += 0.5) {
                const lineGeometry = new THREE.BoxGeometry(0.02, 0.06, 1.18);
                const line = new THREE.Mesh(lineGeometry, goldMaterial);
                line.position.x = i;
                panel.add(line);
            }
            
            // Support arm
            const armGeometry = new THREE.CylinderGeometry(0.08, 0.08, 1.5, 8);
            const arm = new THREE.Mesh(armGeometry, bodyMaterial);
            arm.rotation.z = Math.PI / 2;
            arm.position.x = x > 0 ? -0.75 : 0.75;
            panel.add(arm);
            
            panel.position.x = x;
            panel.rotation.y = rotationY;
            return panel;
        }
        
        const leftPanel = createSolarPanel(-2.8, 0);
        const rightPanel = createSolarPanel(2.8, 0);
        panelGroup.add(leftPanel);
        panelGroup.add(rightPanel);
        
        // Communication dish
        const dishGroup = new THREE.Group();
        dishGroup.position.set(0, 0.5, 1.2);
        dishGroup.rotation.x = -Math.PI / 6;
        satellite.add(dishGroup);
        
        // Dish parabola
        const dishGeometry = new THREE.SphereGeometry(0.6, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.35);
        const dish = new THREE.Mesh(dishGeometry, dishMaterial);
        dish.rotation.x = Math.PI;
        dish.castShadow = true;
        dishGroup.add(dish);
        
        // Dish feed horn
        const hornGeometry = new THREE.CylinderGeometry(0.08, 0.12, 0.3, 8);
        const horn = new THREE.Mesh(hornGeometry, goldMaterial);
        horn.position.y = 0.4;
        dishGroup.add(horn);
        
        // Antenna rods
        const antennaGeometry = new THREE.CylinderGeometry(0.02, 0.02, 1.5, 8);
        const antenna1 = new THREE.Mesh(antennaGeometry, goldMaterial);
        antenna1.position.set(0.3, 1.5, 0);
        antenna1.rotation.z = -0.2;
        satellite.add(antenna1);
        
        const antenna2 = new THREE.Mesh(antennaGeometry, goldMaterial);
        antenna2.position.set(-0.3, 1.5, 0);
        antenna2.rotation.z = 0.2;
        satellite.add(antenna2);
        
        // Starfield background
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const posArray = new Float32Array(starsCount * 3);
        
        for (let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({
            size: 0.05,
            color: 0xffffff,
            transparent: true,
            opacity: 0.8
        });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // Earth glow (background)
        const earthGeometry = new THREE.SphereGeometry(15, 64, 64);
        const earthMaterial = new THREE.MeshBasicMaterial({
            color: 0x1a4a8a,
            transparent: true,
            opacity: 0.15,
            side: THREE.BackSide
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        earth.position.y = -18;
        scene.add(earth);
        
        // Animation state
        let autoRotate = true;
        let panelsVisible = true;
        let wireframeMode = false;
        
        // Button handlers
        document.getElementById('btn-rotate').addEventListener('click', function() {
            autoRotate = !autoRotate;
            this.classList.toggle('active');
        });
        
        document.getElementById('btn-panels').addEventListener('click', function() {
            panelsVisible = !panelsVisible;
            panelGroup.visible = panelsVisible;
            this.classList.toggle('active');
        });
        
        document.getElementById('btn-wireframe').addEventListener('click', function() {
            wireframeMode = !wireframeMode;
            satellite.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.wireframe = wireframeMode;
                }
            });
            this.classList.toggle('active');
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (autoRotate) {
                satellite.rotation.y += 0.003;
                satellite.rotation.x = Math.sin(Date.now() * 0.0005) * 0.1;
            }
            
            // Pulse glow
            glow.material.opacity = 0.5 + Math.sin(Date.now() * 0.003) * 0.3;
            
            // Rotate stars slowly
            stars.rotation.y += 0.0002;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
